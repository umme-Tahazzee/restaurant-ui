<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savoria — Manager Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Jost:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
   <link rel="stylesheet" href="../layout.css">
  <link rel="stylesheet" href="theme.css"/>
  <style>
    #sidebarBackdrop { display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:149;backdrop-filter:blur(2px);animation:fadeIn .2s ease; }
    #sidebarBackdrop.show { display:block; }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    #mobileMenuBtn { display:none;align-items:center;justify-content:center;width:36px;height:36px;border:none;background:transparent;color:var(--text-2);cursor:pointer;border-radius:8px;font-size:16px;flex-shrink:0;transition:background .15s; }
    #mobileMenuBtn:hover { background:var(--bg-input); }
    @media(max-width:640px){
      #mobileMenuBtn{display:flex}
      #sidebar{position:fixed!important;left:-260px!important;top:0;height:100vh;z-index:150;transition:left .25s cubic-bezier(.4,0,.2,1)!important;box-shadow:none}
      #sidebar.mobile-open{left:0!important;box-shadow:4px 0 32px rgba(0,0,0,.18)}
      #sidebar.collapsed{width:220px!important}
      #sidebar.collapsed .nav-lbl,#sidebar.collapsed .sidebar-logo-sub,#sidebar.collapsed .sidebar-footer-text,#sidebar.collapsed .nav-section-title{display:block!important;opacity:1!important}
      #mainContent{margin-left:0!important;width:100%!important}
      .topbar-search,.live-badge,#topClock{display:none}
      .topbar-right{gap:4px}
      #pageArea{padding:12px!important}
    }
    @media(min-width:641px) and (max-width:1024px){
      #sidebar{width:64px!important}
      #sidebar .nav-lbl,#sidebar .sidebar-logo-sub,#sidebar .sidebar-footer-text,#sidebar .nav-section-title{display:none!important;opacity:0!important}
      #sidebar .badge-dot{right:4px;top:4px}
      #sidebar .sidebar-footer{padding:10px 6px;justify-content:center}
      #sidebar .sidebar-logout-btn,#sidebar .logo-text{display:none}
      #sidebar .sidebar-avatar,#sidebar .sidebar-toggle-btn{margin:0 auto}
      #mainContent{margin-left:64px!important}
      .topbar-search{max-width:180px}
      #topClock{display:none}
      #pageArea{padding:16px!important}
    }
    @media(max-width:420px){#topbar{padding:0 10px;gap:6px}.topbar-right{gap:2px}.topbar-avatar{width:30px;height:30px;font-size:10px}}
    .mgr-badge{display:inline-flex;align-items:center;gap:4px;background:var(--gold-pale);border:1px solid rgba(184,150,62,.25);border-radius:20px;padding:3px 10px}
  </style>
</head>
<body>

<div id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>

<div id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-wrapper">
      <div class="logo-text">
        <span class="sidebar-logo-brand">Sav<em>o</em>ria</span>
        <span class="sidebar-logo-sub">Manager Portal</span>
      </div>
      <button class="sidebar-toggle-btn" onclick="handleSidebarToggle()" title="Collapse sidebar">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>
    </div>
  </div>
  <div class="gold-line"></div>
  <nav class="sidebar-nav">
    <div class="nav-section-title">Overview</div>
    <button class="nav-item active" data-view="mgr-dashboard" onclick="navGo('mgr-dashboard',this)">
      <i class="fa-solid fa-gauge-high"></i><span class="nav-lbl">Dashboard</span>
    </button>
    <div class="nav-section-title">Operations</div>
    <button class="nav-item" data-view="mgr-orders" onclick="navGo('mgr-orders',this)">
      <i class="fa-solid fa-receipt"></i><span class="nav-lbl">All Orders</span>
      <span class="badge-dot" id="pendingBadge">0</span>
    </button>
    <button class="nav-item" data-view="mgr-tables" onclick="navGo('mgr-tables',this)">
      <i class="fa-solid fa-table-cells"></i><span class="nav-lbl">Table Management</span>
    </button>
    <button class="nav-item" data-view="mgr-inventory" onclick="navGo('mgr-inventory',this)">
      <i class="fa-solid fa-boxes-stacked"></i><span class="nav-lbl">Inventory</span>
    </button>
    <div class="nav-section-title">People</div>
    <button class="nav-item" data-view="mgr-staff" onclick="navGo('mgr-staff',this)">
      <i class="fa-solid fa-users-gear"></i><span class="nav-lbl">Staff Management</span>
    </button>
    <button class="nav-item" data-view="customers" onclick="navGo('customers',this)">
      <i class="fa-solid fa-users"></i><span class="nav-lbl">Customers</span>
    </button>
    <div class="nav-section-title">Finance</div>
    <button class="nav-item" data-view="salesreport" onclick="navGo('salesreport',this)">
      <i class="fa-solid fa-chart-line"></i><span class="nav-lbl">Sales Report</span>
    </button>
    <button class="nav-item" data-view="expensereport" onclick="navGo('expensereport',this)">
      <i class="fa-solid fa-file-invoice-dollar"></i><span class="nav-lbl">Expense Report</span>
    </button>
    <button class="nav-item" data-view="transactions" onclick="navGo('transactions',this)">
      <i class="fa-solid fa-money-bill-transfer"></i><span class="nav-lbl">Transactions</span>
    </button>
    <div class="nav-section-title">System</div>
    <button class="nav-item" data-view="mgr-profile" onclick="navGo('mgr-profile',this)">
      <i class="fa-solid fa-user-tie"></i><span class="nav-lbl">My Profile</span>
    </button>
    <button class="nav-item" data-view="settings" onclick="navGo('settings',this)">
      <i class="fa-solid fa-gear"></i><span class="nav-lbl">Settings</span>
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-avatar" style="background:var(--gold);color:#fff">AR</div>
    <div class="sidebar-footer-text">
      <p class="sidebar-footer-name">Ahmed Rahman</p>
      <p class="sidebar-footer-role">Restaurant Manager</p>
    </div>
    <button class="sidebar-logout-btn" onclick="Toast.show('Logged out','info')" title="Log out">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>
</div>

<div id="mainContent">
  <div id="topbar">
    <button class="topbar-icon-btn" id="mobileMenuBtn" onclick="openMobileSidebar()">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="topbar-search flex items-center gap-3 px-5 h-8">
      <i class="fa-solid fa-magnifying-glass" style="color:var(--text-3);font-size:12px;flex-shrink:0"></i>
      <input id="globalSearch" type="text" placeholder="Search anything…" autocomplete="off"/>
    </div>
    <div class="topbar-right">
      <div class="live-badge hidden md:flex">
        <span class="live-dot"></span>
        <span style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.1em">Live</span>
      </div>
      <div id="topClock" class="hidden md:block" style="font-size:11px;color:var(--text-3);white-space:nowrap"></div>
      <div class="mgr-badge hidden md:flex">
        <i class="fa-solid fa-shield-halved" style="font-size:9px;color:var(--gold)"></i>
        <span style="font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.05em;text-transform:uppercase">Manager</span>
      </div>
      <button class="topbar-icon-btn" onclick="Theme.toggle()" title="Toggle theme">
        <i id="themeIcon" class="fa-solid fa-moon"></i>
      </button>
      <div style="position:relative">
        <button class="topbar-icon-btn" id="notifBtn" onclick="toggleNotif()">
          <i class="fa-regular fa-bell"></i>
          <span id="notifBadge" class="notif-badge" style="display:none">0</span>
        </button>
        <div id="notifDrop">
          <div class="notif-header">
            <div style="display:flex;align-items:center;gap:8px">
              <i class="fa-solid fa-bell" style="font-size:12px;color:var(--gold)"></i>
              <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:14px">Notifications</span>
              <span class="tag tag-pending notif-count-badge">0 new</span>
            </div>
            <div style="display:flex;gap:12px;align-items:center">
              <button class="notif-action-btn" onclick="Notif.markAllRead()">Mark all read</button>
              <button class="notif-action-btn" onclick="Notif.clear()" style="color:var(--red)">Clear</button>
            </div>
          </div>
          <div id="notifList"></div>
          <div class="notif-footer">
            <i class="fa-solid fa-shield-halved" style="font-size:9px;color:var(--text-3)"></i>
            <span>Savoria Manager Portal — local notifications only</span>
          </div>
        </div>
      </div>
      <div class="topbar-avatar" style="background:var(--gold)" title="Ahmed Rahman">AR</div>
    </div>
  </div>
  <div id="pageArea"></div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="orderModal">
  <div class="modal"><button class="modal-close" onclick="Modal.close('orderModal')"><i class="fa-solid fa-xmark"></i></button><div id="orderModalContent"></div></div>
</div>
<div class="modal-overlay" id="customerModal">
  <div class="modal"><button class="modal-close" onclick="Modal.close('customerModal')"><i class="fa-solid fa-xmark"></i></button><div id="customerModalContent"></div></div>
</div>
<div class="modal-overlay" id="staffModal">
  <div class="modal"><button class="modal-close" onclick="Modal.close('staffModal')"><i class="fa-solid fa-xmark"></i></button><div id="staffModalContent"></div></div>
</div>
<div class="modal-overlay" id="expenseModal">
  <div class="modal"><button class="modal-close" onclick="Modal.close('expenseModal')"><i class="fa-solid fa-xmark"></i></button><div id="expenseModalContent"></div></div>
</div>
<div id="toastContainer"></div>

<script>
  function isMobile(){return window.innerWidth<=640}
  function openMobileSidebar(){document.getElementById('sidebar').classList.add('mobile-open');document.getElementById('sidebarBackdrop').classList.add('show');document.body.style.overflow='hidden'}
  function closeMobileSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('sidebarBackdrop').classList.remove('show');document.body.style.overflow=''}
  function handleSidebarToggle(){if(isMobile())closeMobileSidebar();else Sidebar.toggle()}
  function navGo(view,el){if(isMobile())closeMobileSidebar();Router.go(view,el)}
  document.addEventListener('click',e=>{const d=document.getElementById('notifDrop');if(d&&!e.target.closest('#notifDrop')&&!e.target.closest('#notifBtn'))d.style.display='none'});
  let _sx=0;
  document.addEventListener('touchstart',e=>{_sx=e.touches[0].clientX},{passive:true});
  document.addEventListener('touchend',e=>{if(!isMobile())return;const dx=_sx-e.changedTouches[0].clientX;if(dx>60&&document.getElementById('sidebar').classList.contains('mobile-open'))closeMobileSidebar()},{passive:true});
  window.addEventListener('resize',()=>{if(!isMobile()){closeMobileSidebar();document.body.style.overflow=''}});
</script>

<script src="data.js"></script>
<script src="app.js"></script>
<script src="Notify.js"></script>
<script src="mgr-dashboard.js"></script>
<script src="mgr-staff.js"></script>
<script src="mgr-tables.js"></script>
<script src="mgr-inventory.js"></script>
<script src="mgr-orders.js"></script>
<script src="salesreport.js"></script>
<script src="expensereport.js"></script>
<script src="customers.js"></script>
<script src="transactions.js"></script>
<script src="mgr-profile.js"></script>
<script src="settings.js"></script>
</body>
</html>
