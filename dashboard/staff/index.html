<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savoria — Restaurant Dashboard</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Jost:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet"/>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <!-- Charts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- Our styles -->
  <link rel="stylesheet" href="theme.css"/>
</head>

<body>


<div id="sidebar">

  <!-- Logo + toggle button -->
  <div class="sidebar-logo">
    <div class="logo-wrapper">
      <div class="logo-text">
        <span class="sidebar-logo-brand">Sav<em>o</em>ria</span>
        <span class="sidebar-logo-sub">Management</span>
      </div>
      <button class="sidebar-toggle-btn" onclick="Sidebar.toggle()" title="Collapse sidebar">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>
    </div>
  </div>

  <div class="gold-line"></div>

  <!-- Navigation links -->
  <nav class="sidebar-nav">

    <div class="nav-section-title">Overview</div>

    <button class="nav-item active" data-view="dashboard" onclick="Router.go('dashboard',this)">
      <i class="fa-solid fa-chart-line"></i>
      <span class="nav-lbl">Dashboard</span>
    </button>

    <div class="nav-section-title">Orders</div>

    <!-- Orders — shows badge with pending count -->
    <button class="nav-item" data-view="orders" onclick="Router.go('orders',this)">
      <i class="fa-solid fa-receipt"></i>
      <span class="nav-lbl">Orders</span>
      <span class="badge-dot" id="pendingBadge">3</span>
    </button>

    <!-- Get Order (POS / take order screen) -->
    <button class="nav-item" data-view="getorder" onclick="Router.go('getorder',this)">
      <i class="fa-solid fa-plus-circle"></i>
      <span class="nav-lbl">Get Order</span>
    </button>

    <div class="nav-section-title">Reports</div>

    <button class="nav-item" data-view="salesreport" onclick="Router.go('salesreport',this)">
      <i class="fa-solid fa-chart-line"></i>
      <span class="nav-lbl">Sales Report</span>
    </button>

    <button class="nav-item" data-view="expensereport" onclick="Router.go('expensereport',this)">
      <i class="fa-solid fa-file-invoice-dollar"></i>
      <span class="nav-lbl">Expense Report</span>
    </button>

    <div class="nav-section-title">Management</div>

    <button class="nav-item" data-view="customers" onclick="Router.go('customers',this)">
      <i class="fa-solid fa-users"></i>
      <span class="nav-lbl">Customers</span>
    </button>

    <button class="nav-item" data-view="transactions" onclick="Router.go('transactions',this)">
      <i class="fa-solid fa-money-bill-transfer"></i>
      <span class="nav-lbl">Transactions</span>
    </button>

    <div class="nav-section-title">System</div>

    <button class="nav-item" data-view="settings" onclick="Router.go('settings',this)">
      <i class="fa-solid fa-gear"></i>
      <span class="nav-lbl">Settings</span>
    </button>

  </nav>

  <!-- Logged-in user info -->
  <div class="sidebar-footer">
    <div class="sidebar-avatar">T</div>
    <div class="sidebar-footer-text">
      <p class="sidebar-footer-name">Umme Tahazzee</p>
      <p class="sidebar-footer-role">Executive Chef</p>
    </div>
    <button class="sidebar-logout-btn" onclick="Toast.show('Logged out','info')" title="Log out">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

</div><!-- /sidebar -->


<!-- ════════════════════════════════════════
     MAIN CONTENT AREA
════════════════════════════════════════ -->
<div id="mainContent">

  <!-- ── TOP BAR ── -->
  <div id="topbar">

    <!-- Search -->
    <div class="topbar-search">
      <i class="fa-solid fa-magnifying-glass" style="color:var(--text-3);font-size:12px;flex-shrink:0"></i>
      <input id="globalSearch" type="text" placeholder="Search orders, customers…" autocomplete="off"/>
    </div>

    <!-- Right-side actions -->
    <div class="topbar-right">

      <!-- Live indicator -->
      <div class="live-badge">
        <span class="live-dot"></span>
        <span style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.1em">Live</span>
      </div>

      <!-- Date & time clock -->
      <div id="topClock" style="font-size:11px;color:var(--text-3);font-family:'Cormorant Garamond',
      serif;font-style:italic;white-space:nowrap"></div>

      <!-- Theme toggle (light ↔ dark) -->
      <button class="topbar-icon-btn" onclick="Theme.toggle()" title="Toggle theme">
        <i id="themeIcon" class="fa-solid fa-moon"></i>
      </button>

      <!-- Notification bell -->
      <div style="position:relative">
        <button class="topbar-icon-btn" id="notifBtn" onclick="toggleNotif()">
          <i class="fa-regular fa-bell"></i>
          <span style="position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--red)"></span>
        </button>

        <!-- Notification dropdown -->
        <div id="notifDrop">
          <div class="notif-header">
            <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:14px">Notifications</span>
            <span class="tag tag-pending">4 new</span>
          </div>
          <div style="max-height:260px;overflow-y:auto">
            <div class="notif-item">
              <span class="notif-dot" style="background:var(--red)"></span>
              <div><p style="font-size:12px;font-weight:600">New order #051 — Table 4</p><p style="font-size:10px;color:var(--text-3)">2 min ago</p></div>
            </div>
            <div class="notif-item">
              <span class="notif-dot" style="background:var(--orange)"></span>
              <div><p style="font-size:12px;font-weight:600">Low stock: Wagyu (2kg left)</p><p style="font-size:10px;color:var(--text-3)">15 min ago</p></div>
            </div>
            <div class="notif-item">
              <span class="notif-dot" style="background:var(--green)"></span>
              <div><p style="font-size:12px;font-weight:600">Order #048 delivered</p><p style="font-size:10px;color:var(--text-3)">22 min ago</p></div>
            </div>
            <div class="notif-item">
              <span class="notif-dot" style="background:var(--gold)"></span>
              <div><p style="font-size:12px;font-weight:600">New reservation: 8 pax, 8pm</p><p style="font-size:10px;color:var(--text-3)">1 hour ago</p></div>
            </div>
          </div>
        </div>
      </div><!-- /notif wrapper -->

      <!-- User avatar -->
      <div class="topbar-avatar" title="Marco Ferretti">UT</div>
    </div>
  </div><!-- /topbar -->

  <!-- ── VIEW PAGES render here ── -->
  <div id="pageArea"></div>

</div><!-- /mainContent -->


<!-- ════════════════════════════════════════
     MODALS (shared across views)
════════════════════════════════════════ -->

<!-- Order detail modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <button class="modal-close" onclick="Modal.close('orderModal')"><i class="fa-solid fa-xmark"></i></button>
    <div id="orderModalContent"></div>
  </div>
</div>

<!-- Customer detail / add modal -->
<div class="modal-overlay" id="customerModal">
  <div class="modal">
    <button class="modal-close" onclick="Modal.close('customerModal')"><i class="fa-solid fa-xmark"></i></button>
    <div id="customerModalContent"></div>
  </div>
</div>

<!-- Expense add modal -->
<div class="modal-overlay" id="expenseModal">
  <div class="modal">
    <button class="modal-close" onclick="Modal.close('expenseModal')"><i class="fa-solid fa-xmark"></i></button>
    <div id="expenseModalContent"></div>
  </div>
</div>


<!-- ════════════════════════════════════════
     TOAST CONTAINER
     Toast.show() appends items here
════════════════════════════════════════ -->
<div id="toastContainer"></div>


<!-- ════════════════════════════════════════
     SCRIPTS — load order matters!
     1. Data first (all views read from DB)
     2. App core (Router, Theme, Utils, etc.)
     3. Views (each view is one file)
════════════════════════════════════════ -->

<!-- 1. Data -->
<script src="data.js"></script>

<!-- 2. App core -->
<script src="app.js"></script>

<!-- 3. Views (each file = one page) -->
<script src="dashboard.js"></script>
<script src="orders.js"></script>
<script src="getorder.js"></script>
<script src="salesreport.js"></script>
<script src="expensereport.js"></script>
<script src="customers.js"></script>
<script src="transactions-settings.js"></script>

</body>
</html>
