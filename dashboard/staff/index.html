<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savoria — Restaurant Dashboard</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Jost:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet"/>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <!-- Charts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- Our styles -->
   <link rel="stylesheet" href="../layout.css">
  <link rel="stylesheet" href="theme.css"/>

  <style>
    /* ══════════════════════════════════════════
       RESPONSIVE LAYOUT OVERRIDES
       (Supplements theme.css for mobile/tablet)
    ══════════════════════════════════════════ */

    /* ── Mobile sidebar backdrop overlay ── */
    #sidebarBackdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 149;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      animation: fadeIn .2s ease;
    }
    #sidebarBackdrop.show { display: block; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

    /* ── Mobile hamburger in topbar ── */
    #mobileMenuBtn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--text-2);
      cursor: pointer;
      border-radius: 8px;
      font-size: 16px;
      flex-shrink: 0;
      transition: background .15s;
    }
    #mobileMenuBtn:hover { background: var(--bg-input); }

    /* ── Topbar search hide on small screens ── */
    @media (max-width: 640px) {
      #mobileMenuBtn { display: flex; }

      /* Sidebar slides in as overlay */
      #sidebar {
        position: fixed !important;
        left: -260px !important;
        top: 0;
        height: 100vh;
        z-index: 150;
        transition: left .25s cubic-bezier(.4,0,.2,1) !important;
        box-shadow: none;
      }
      #sidebar.mobile-open {
        left: 0 !important;
        box-shadow: 4px 0 32px rgba(0,0,0,.18);
      }
      /* Collapsed state ignored on mobile — always full width when open */
      #sidebar.collapsed { width: 220px !important; }
      #sidebar.collapsed .nav-lbl,
      #sidebar.collapsed .sidebar-logo-sub,
      #sidebar.collapsed .sidebar-footer-text,
      #sidebar.collapsed .nav-section-title { display: block !important; opacity: 1 !important; }
      #sidebar.collapsed .badge-dot { display: flex !important; }

      /* Main content takes full width */
      #mainContent { margin-left: 0 !important; width: 100% !important; }

      /* Topbar compact */
      .topbar-search { display: none; }
      #topClock { display: none; }
      .live-badge { display: none; }

      /* Topbar right compacted */
      .topbar-right { gap: 4px; }

      /* pageArea padding */
      #pageArea { padding: 12px !important; }
    }

    /* ── Tablet: collapsed sidebar, tighter layout ── */
    @media (min-width: 641px) and (max-width: 1024px) {
      #sidebar { width: 64px !important; }
      #sidebar .nav-lbl,
      #sidebar .sidebar-logo-sub,
      #sidebar .sidebar-footer-text,
      #sidebar .nav-section-title { display: none !important; opacity: 0 !important; }
      #sidebar .badge-dot { right: 4px; top: 4px; }
      #sidebar .sidebar-footer { padding: 10px 6px; justify-content: center; }
      #sidebar .sidebar-logout-btn { display: none; }
      #sidebar .sidebar-avatar { margin: 0 auto; }
      #sidebar .logo-text { display: none; }
      #sidebar .sidebar-toggle-btn { margin: 0 auto; }
      #mainContent { margin-left: 64px !important; }

      /* Topbar search smaller */
      .topbar-search { max-width: 180px; }
      #topClock { display: none; }
      #pageArea { padding: 16px !important; }
    }

    /* ── Topbar: stack search + right on very small ── */
    @media (max-width: 420px) {
      #topbar { padding: 0 10px; gap: 6px; }
      .topbar-right { gap: 2px; }
      .topbar-avatar { width: 30px; height: 30px; font-size: 10px; }
    }
  </style>
</head>

<body>

<!-- Mobile sidebar backdrop -->
<div id="sidebarBackdrop" onclick="closeMobileSidebar()"></div>

<div id="sidebar">

    <div class="nav-section-title">Reports</div>

    <button class="nav-item" data-view="salesreport" onclick="navGo('salesreport',this)">

      <span class="nav-lbl">Sales Report</span>
    </button>

    <button class="nav-item" data-view="expensereport" onclick="navGo('expensereport',this)">

    </button>

    <div class="nav-section-title">Management</div>

    <button class="nav-item" data-view="customers" onclick="navGo('customers',this)">
      <i class="fa-solid fa-users"></i>
      <span class="nav-lbl">Customers</span>
    </button>

    <button class="nav-item" data-view="transactions" onclick="navGo('transactions',this)">
      <i class="fa-solid fa-money-bill-transfer"></i>
      <span class="nav-lbl">Transactions</span>
    </button>

    <div class="nav-section-title">System</div>

    <div class="nav-item" data-view="profile" onclick="Router.go('profile',this)">
       <i class="fa-solid fa-user"></i> <span>My Profile</span>
    </div>    

    <button class="nav-item" data-view="settings" onclick="navGo('settings',this)">
      <i class="fa-solid fa-gear"></i>
      <span class="nav-lbl">Settings</span>
    </button>

  </nav>

  <!-- Logged-in user info -->
  <div class="sidebar-footer">
    <div id="sidebarAvatar" class="sidebar-avatar">S</div>
    <div class="sidebar-footer-text">
      <p id="sidebarName" class="sidebar-footer-name">Staff Member</p>
      <p id="sidebarRole" class="sidebar-footer-role">Staff Portal</p>
    </div>
    <button class="sidebar-logout-btn" onclick="confirmLogout()" title="Log out">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

</div>
<!-- /sidebar -->


<!-- ════════════════════════════════════════

<div id="mainContent">

  <!-- TOP BAR -->

    <!-- Mobile menu button -->

    id="mobileMenuBtn" onclick="openMobileSidebar()">
    <i class="fa-solid fa-bars"></i>
   </button>

    <!-- Search -->
    <div class=" topbar-search flex items-center gap-3 md:gap-3 px-5 md:px-5 px-3 h-8">

        color:var(--text-3);font-size:12px;flex-shrink:0"></i>

      <!-- Theme toggle -->

      <!-- Notification bell -->
      <div style="position:relative">
    
       <!-- Notification bell — index.html এ এই পুরো block টা replace করো -->
     <div style="position:relative">

      <span>Savoria Admin — local notifications only</span>
    </div>

  </div>
    </div>
      </div>

      <!-- User avatar -->

<!-- ════════════════════════════════════════
     MOBILE SIDEBAR HELPERS
════════════════════════════════════════ -->
<script>
  function isMobile() { return window.innerWidth <= 640; }

  function openMobileSidebar() {
    document.getElementById('sidebar').classList.add('mobile-open');
    document.getElementById('sidebarBackdrop').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarBackdrop').classList.remove('show');
    document.body.style.overflow = '';
  }

  function handleSidebarToggle() {
    if (isMobile()) {
      closeMobileSidebar();
    } else {
      Sidebar.toggle();
    }
  }

  /* Auto-close sidebar on mobile when a nav item is tapped */
  function navGo(view, el) {
    if (isMobile()) closeMobileSidebar();
    Router.go(view, el);
  }

  /* Close notification dropdown & mobile sidebar on outside click */
  document.addEventListener('click', e => {
    const drop = document.getElementById('notifDrop');
    if (drop && !e.target.closest('#notifDrop') && !e.target.closest('#notifBtn')) {
      drop.style.display = 'none';
    }
  });

  /* Swipe-left to close sidebar on mobile */
  let _swipeStartX = 0;
  document.addEventListener('touchstart', e => { _swipeStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!isMobile()) return;
    const dx = _swipeStartX - e.changedTouches[0].clientX;
    if (dx > 60 && document.getElementById('sidebar').classList.contains('mobile-open')) {
      closeMobileSidebar();
    }
  }, { passive: true });

  /* Resize: clean up mobile state when going back to desktop */
  window.addEventListener('resize', () => {
    if (!isMobile()) {
      closeMobileSidebar();
      document.body.style.overflow = '';
    }
  });
</script>

<!-- ══ LOGOUT CONFIRMATION MODAL ══ -->
<div id="logoutModal" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)">
  <div style="background:linear-gradient(160deg,#1f1410,#1a1210,#150f0c);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:32px;width:100%;max-width:380px;margin:16px;box-shadow:0 32px 80px rgba(0,0,0,.45);position:relative;animation:fadeUpModal .25s ease">
    <div style="position:absolute;top:0;left:28px;right:28px;height:1px;background:linear-gradient(90deg,transparent,rgba(184,150,62,.4),transparent)"></div>
    <div style="width:52px;height:52px;border-radius:14px;background:rgba(192,57,43,.14);border:1px solid rgba(192,57,43,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 18px">
      <i class="fa-solid fa-right-from-bracket" style="font-size:18px;color:#c0392b"></i>
    </div>
    <h3 style="font-family:'Playfair Display',serif;font-size:21px;font-weight:900;color:#fff;text-align:center;margin-bottom:8px">Sign Out?</h3>
    <p style="font-size:13px;color:rgba(255,255,255,.38);text-align:center;line-height:1.65;margin-bottom:26px;font-family:'Jost',sans-serif">Your session will be ended and you'll be<br>redirected to the login page.</p>
    <div style="display:flex;gap:10px">
      <button onclick="cancelLogout()" style="flex:1;padding:12px 0;border-radius:11px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.1)';this.style.color='rgba(255,255,255,.75)'" onmouseout="this.style.background='rgba(255,255,255,.05)';this.style.color='rgba(255,255,255,.45)'">Stay</button>
      <button onclick="doLogout()" id="logoutConfirmBtn" style="flex:1;padding:12px 0;border-radius:11px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:none;background:linear-gradient(135deg,#c0392b,#8b2218);color:#fff;cursor:pointer;font-family:'Jost',sans-serif;box-shadow:0 4px 16px rgba(192,57,43,.38);transition:all .2s" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">
        <span id="logoutConfirmText">Sign Out</span>
      </button>
    </div>
  </div>
</div>
<style>
  @keyframes fadeUpModal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
<script>
  /* ── Logout modal ── */
  function confirmLogout() {
    var m = document.getElementById('logoutModal');
    m.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function cancelLogout() {
    var m = document.getElementById('logoutModal');
    m.style.display = 'none';
    document.body.style.overflow = '';
  }
  function doLogout() {
    var btn = document.getElementById('logoutConfirmBtn');
    var txt = document.getElementById('logoutConfirmText');
    if (btn) { btn.disabled = true; btn.style.opacity = '.5'; }
    if (txt) txt.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:6px"></i>Signing out…';
    localStorage.removeItem('currentUser');
    localStorage.removeItem('sv_user');
    setTimeout(function(){ window.location.href = '../login.html'; }, 700);
  }
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') cancelLogout(); });
  document.addEventListener('DOMContentLoaded', function(){
    var m = document.getElementById('logoutModal');
    if (m) m.addEventListener('click', function(e){ if(e.target===this) cancelLogout(); });

    /* ── Populate sidebar user info from localStorage ── */
    var u = null;
    try { u = JSON.parse(localStorage.getItem('currentUser')); } catch(e){}
    if (u) {
      var av = document.getElementById('sidebarAvatar');
      var nm = document.getElementById('sidebarName');
      var rl = document.getElementById('sidebarRole');
      if (av) av.textContent = (u.name || 'U').charAt(0).toUpperCase();
      if (nm) nm.textContent = u.name || 'User';
      if (rl) rl.textContent = { admin:'Administrator', manager:'Manager', staff:'Staff Member' }[u.role] || u.role || 'Portal User';
    }
  });
</script>
