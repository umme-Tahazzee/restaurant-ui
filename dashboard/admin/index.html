<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savoria — Admin Dashboard</title>
  <meta name="description" content="Savoria Restaurant Admin Dash
  board — Manage branches, sales, expenses, products, customers, reviews and more."/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Jost:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet"/>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <!-- Charts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- jsPDF -->

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['Jost', 'sans-serif'],
            italic: ['Cormorant Garamond', 'serif'],
          }
        }

    }
  </script>
  <!-- Our theme -->
   <link rel="stylesheet" href="../layout.css">
  <link rel="stylesheet" href="theme.css"/>
</head>

<body>

<!-- ════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════ -->
<div id="sidebar">

  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-wrapper">
      <div class="logo-text">
        <a href="../../index.html"><span class="sidebar-logo-brand">Sav<em>o</em>ria</span></a>
        <span class="sidebar-logo-sub">Admin Panel</span>
      </div>
      <button class="sidebar-toggle-btn" onclick="Sidebar.toggle()" title="Collapse sidebar">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>
    </div>
  </div>

  <div class="gold-line"></div>

  <!-- Navigation -->
  <nav class="sidebar-nav">

    <div class="nav-section-title">Overview</div>

    <button class="nav-item active" data-view="dashboard" onclick="Router.go('dashboard',this)">
      <i class="fa-solid fa-chart-pie"></i>
      <span class="nav-lbl">Dashboard</span>
    </button>

    <button class="nav-item" data-view="report" onclick="Router.go('report',this)">
      <i class="fa-solid fa-chart-bar"></i>
      <span class="nav-lbl">Report</span>
    </button>

     <button class="nav-item" data-view="ingredient" onclick="Router.go('ingredient',this)">
      <i class="fa-solid fa-chart-bar"></i>
      <span class="nav-lbl">Ingredient Report</span>
    </button>


    <div class="nav-section-title">Management</div>

    <button class="nav-item" data-view="customers" onclick="Router.go('customers',this)">
      <i class="fa-solid fa-users"></i>
      <span class="nav-lbl">Customers</span>
    </button>

    <button class="nav-item" data-view="reviews" onclick="Router.go('reviews',this)">
      <i class="fa-solid fa-star"></i>
      <span class="nav-lbl">Reviews</span>
      <span class="badge-dot">3</span>
    </button>

    <button class="nav-item" data-view="transactions" onclick="Router.go('transactions',this)">
      <i class="fa-solid fa-money-bill-transfer"></i>
      <span class="nav-lbl">Transactions</span>
    </button>

    <div class="nav-section-title">Operations</div>

    <button class="nav-item" data-view="expense" onclick="Router.go('expense',this)">
      <i class="fa-solid fa-file-invoice-dollar"></i>
      <span class="nav-lbl">Expense</span>
    </button>

    <button class="nav-item" data-view="product" onclick="Router.go('product',this)">
      <i class="fa-solid fa-box-open"></i>
      <span class="nav-lbl">Products</span>
    </button>

    <button class="nav-item" data-view="blog" onclick="Router.go('blog',this)">
      <i class="fa-solid fa-newspaper"></i>
      <span class="nav-lbl">Blog</span>
    </button>

    <div class="nav-section-title">System</div>

    <button class="nav-item" data-view="profile" onclick="Router.go('profile',this)">
      <i class="fa-solid fa-user-circle"></i>
      <span class="nav-lbl">Profile</span>
    </button>

    <button class="nav-item" data-view="settings" onclick="Router.go('settings',this)">
      <i class="fa-solid fa-gear"></i>
      <span class="nav-lbl">Settings</span>
    </button>

  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div id="sidebarAvatar" class="sidebar-avatar">A</div>
    <div class="sidebar-footer-text">
      <p id="sidebarName" class="sidebar-footer-name">Administrator</p>
      <p id="sidebarRole" class="sidebar-footer-role">Admin Portal</p>
    </div>
    <button class="sidebar-logout-btn" onclick="confirmLogout()" title="Log out">
      <i class="fa-solid fa-right-from-bracket"></i>
    </button>
  </div>

</div>
<!-- /sidebar -->

<!-- Mobile overlay -->
<div id="mobileOverlay" onclick="Sidebar.closeMobile()"></div>

<!-- ════════════════════════════════════════
     MAIN CONTENT
════════════════════════════════════════ -->
<div id="mainContent">

  <!-- TOP BAR -->
  <div id="topbar">
    <!-- Mobile menu button -->
    <button class="topbar-icon-btn" style="display:none;border:none" 
    id="mobileMenuBtn" onclick="Sidebar.openMobile()">
      <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Search -->
    <div class=" topbar-search flex items-center gap-3 md:gap-3 px-5 md:px-5 px-3 h-8">
      <i class="fa-solid fa-magnifying-glass" style="
        color:var(--text-3);font-size:12px;flex-shrink:0"></i>
      <input id="globalSearch" type="text" placeholder="Search anything…" autocomplete="off"/>
    </div>

    <!-- Right side -->
    <div class="topbar-right">

      <!-- Live indicator -->
      <div class="live-badge hidden md:flex ">
        <span class="live-dot"></span>
        <span style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.1em">Live</span>
      </div>

      <!-- Clock -->
      <div id="topClock" class="hidden md:block" 
      style="font-size:11px;color:var(--text-3);
     white-space:nowrap"></div>

      <!-- Theme toggle -->
      <button class="topbar-icon-btn" onclick="Theme.toggle()" title="Toggle theme">
        <i id="themeIcon" class="fa-solid fa-moon"></i>
      </button>

      <!-- Notification bell -->
      <div style="position:relative">
    
       <!-- Notification bell — index.html এ এই পুরো block টা replace করো -->
     <div style="position:relative">
     <button class="topbar-icon-btn" id="notifBtn" onclick="toggleNotif()">
      <i class="fa-regular fa-bell"></i>
      <span id="notifBadge" class="notif-badge" style="display:none">0</span>
  </button>

  <div id="notifDrop">

    <!-- Header -->
    <div class="notif-header">
      <div style="display:flex;align-items:center;gap:8px">
        <i class="fa-solid fa-bell" style="font-size:12px;color:var(--gold)"></i>
        <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:14px">Notifications</span>
        <span class="tag tag-pending notif-count-badge">0 new</span>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <button class="notif-action-btn" onclick="Notif.markAllRead()">Mark all read</button>
        <button class="notif-action-btn" onclick="Notif.clear()"
          style="color:var(--red)">Clear</button>
      </div>
    </div>

    <!-- List -->
    <div id="notifList"></div>

    <!-- Footer -->
    <div class="notif-footer">
      <i class="fa-solid fa-shield-halved" style="font-size:9px;color:var(--text-3)"></i>
      <span>Savoria Admin — local notifications only</span>
    </div>

  </div>
    </div>
      </div>

      <!-- User avatar -->
      <div class="topbar-avatar" title="Umme Tahazzee">UT</div>
    </div>
  </div><!-- /topbar -->

  <!-- PAGE AREA — views render here -->
  <div id="pageArea"></div>

</div><!-- /mainContent -->

    <div id="customerModalContent"></div>

</div>

<!-- Expense modal -->

</div>

<!-- Product modal -->

<!-- Blog modal -->

<script>
  /* Mobile menu button show/hide */
  const mq = window.matchMedia('(max-width: 768px)');
  function handleMQ(e) {
    const btn = document.getElementById('mobileMenuBtn');
    if (btn) btn.style.display = e.matches ? 'flex' : 'none';
  }
  mq.addEventListener('change', handleMQ);
  handleMQ(mq);
</script>


<!-- ══ LOGOUT CONFIRMATION MODAL ══ -->
<div id="logoutModal" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)">
  <div style="background:linear-gradient(160deg,#1f1410,#1a1210,#150f0c);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:32px;width:100%;max-width:380px;margin:16px;box-shadow:0 32px 80px rgba(0,0,0,.45);position:relative;animation:fadeUpModal .25s ease">
    <div style="position:absolute;top:0;left:28px;right:28px;height:1px;background:linear-gradient(90deg,transparent,rgba(184,150,62,.4),transparent)"></div>
    <div style="width:52px;height:52px;border-radius:14px;background:rgba(192,57,43,.14);border:1px solid rgba(192,57,43,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 18px">
      <i class="fa-solid fa-right-from-bracket" style="font-size:18px;color:#c0392b"></i>
    </div>
    <h3 style="font-family:'Playfair Display',serif;font-size:21px;font-weight:900;color:#fff;text-align:center;margin-bottom:8px">Sign Out?</h3>
    <p style="font-size:13px;color:rgba(255,255,255,.38);text-align:center;line-height:1.65;margin-bottom:26px;font-family:'Jost',sans-serif">Your session will be ended and you'll be<br>redirected to the login page.</p>
    <div style="display:flex;gap:10px">
      <button onclick="cancelLogout()" style="flex:1;padding:12px 0;border-radius:11px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.45);cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s" onmouseover="this.style.background='rgba(255,255,255,.1)';this.style.color='rgba(255,255,255,.75)'" onmouseout="this.style.background='rgba(255,255,255,.05)';this.style.color='rgba(255,255,255,.45)'">Stay</button>
      <button onclick="doLogout()" id="logoutConfirmBtn" style="flex:1;padding:12px 0;border-radius:11px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border:none;background:linear-gradient(135deg,#c0392b,#8b2218);color:#fff;cursor:pointer;font-family:'Jost',sans-serif;box-shadow:0 4px 16px rgba(192,57,43,.38);transition:all .2s" onmouseover="this.style.opacity='.88'" onmouseout="this.style.opacity='1'">
        <span id="logoutConfirmText">Sign Out</span>
      </button>
    </div>
  </div>
</div>
<style>
  @keyframes fadeUpModal{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
<script>
  /* ── Logout modal ── */
  function confirmLogout() {
    var m = document.getElementById('logoutModal');
    m.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function cancelLogout() {
    var m = document.getElementById('logoutModal');
    m.style.display = 'none';
    document.body.style.overflow = '';
  }
  function doLogout() {
    var btn = document.getElementById('logoutConfirmBtn');
    var txt = document.getElementById('logoutConfirmText');
    if (btn) { btn.disabled = true; btn.style.opacity = '.5'; }
    if (txt) txt.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:6px"></i>Signing out…';
    localStorage.removeItem('currentUser');
    localStorage.removeItem('sv_user');
    setTimeout(function(){ window.location.href = '../login.html'; }, 700);
  }
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') cancelLogout(); });
  document.addEventListener('DOMContentLoaded', function(){
    var m = document.getElementById('logoutModal');
    if (m) m.addEventListener('click', function(e){ if(e.target===this) cancelLogout(); });

    /* ── Populate sidebar user info from localStorage ── */
    var u = null;
    try { u = JSON.parse(localStorage.getItem('currentUser')); } catch(e){}
    if (u) {
      var av = document.getElementById('sidebarAvatar');
      var nm = document.getElementById('sidebarName');
      var rl = document.getElementById('sidebarRole');
      if (av) av.textContent = (u.name || 'U').charAt(0).toUpperCase();
      if (nm) nm.textContent = u.name || 'User';
      if (rl) rl.textContent = { admin:'Administrator', manager:'Manager', staff:'Staff Member' }[u.role] || u.role || 'Portal User';
    }
  });
</script>

</body>
</html>
