<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savoria — Login</title>
  <meta name="description" content="Savoria Restaurant Admin Login — Secure access to the admin dashboard."/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Jost:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet"/>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { serif: ['Playfair Display','serif'], sans: ['Jost','sans-serif'] } } }
    }
  </script>

  <style>
    :root {
      --red:       #c0392b;
      --red-deep:  #96281b;
      --gold:      #b8963e;
      --gold-light:#d4af6a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; height: 100vh; overflow: hidden; }
    .login-bg {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a1210 0%, #2a1c18 50%, #1a1210 100%);
      z-index: -1;
    }
    .login-bg::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(192,57,43,.15) 0%, transparent 60%),
                  radial-gradient(circle at 70% 60%, rgba(184,150,62,.1) 0%, transparent 50%);
    }
    .login-particles {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: rgba(184,150,62,.3);
      border-radius: 50%;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
      opacity: .5;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px; font-weight: 900;
      color: #fff;
    }
    .login-logo h1 em { color: var(--red); font-style: italic; font-weight: 300; }
    .login-logo p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 11px;
      color: rgba(184,150,62,.6);
      letter-spacing: .4em;
      text-transform: uppercase;
      margin-top: -2px;
    }
    .login-tabs {
      display: flex; gap: 0;
      background: rgba(255,255,255,.04);
      border-radius: 10px; padding: 3px;
      margin-bottom: 28px;
    }
    .login-tab {
      flex: 1; padding: 9px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      border: none; background: transparent;
      color: rgba(255,255,255,.4); cursor: pointer;
      transition: all .2s; letter-spacing: .05em;
    }
    .login-tab.active {
      background: rgba(192,57,43,.15);
      color: #fff;
    }
    .login-form-group {
      margin-bottom: 18px;
    }
    .login-label {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,.5);
      letter-spacing: .06em; text-transform: uppercase;
      display: block; margin-bottom: 6px;
    }
    .login-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      font-size: 13px; font-family: 'Jost', sans-serif;
      color: #fff; outline: none;
      transition: border-color .2s;
    }
    .login-input::placeholder { color: rgba(255,255,255,.2); }
    .login-input:focus { border-color: rgba(192,57,43,.5); }
    .login-input-wrap {
      position: relative;
    }
    .login-input-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.2); font-size: 13px;
    }
    .login-input-wrap .login-input { padding-left: 38px; }
    .login-extras {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .login-remember {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: rgba(255,255,255,.4);
    }
    .login-remember input { accent-color: var(--red); }
    .login-forgot {
      font-size: 11px; color: var(--gold);
      text-decoration: none; font-weight: 500;
    }
    .login-forgot:hover { text-decoration: underline; }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--red), var(--red-deep));
      border: none; border-radius: 10px;
      color: #fff; font-size: 13px; font-weight: 700;
      font-family: 'Jost', sans-serif;
      cursor: pointer; transition: all .2s;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .login-btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(192,57,43,.3); }
    .login-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: rgba(255,255,255,.15);
      font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    }
    .login-divider::before,
    .login-divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,.06);
    }
    .login-social {
      display: flex; gap: 8px;
    }
    .login-social-btn {
      flex: 1; padding: 10px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      color: rgba(255,255,255,.5); font-size: 14px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center;
      justify-content: center; gap: 6px;
      font-family: 'Jost', sans-serif; font-size: 11px;
    }
    .login-social-btn:hover { background: rgba(255,255,255,.06); }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .login-logo h1 { font-size: 28px; }
    }
  </style>
</head>

<body>

<div class="login-bg">
  <div class="login-particles" id="particles"></div>
</div>

<div class="login-container">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <h1>Sav<em>o</em>ria</h1>
      <p>Admin Panel</p>
    </div>

    <!-- Tabs -->
    <div class="login-tabs">
      <button class="login-tab active" onclick="showTab('login',this)">Sign In</button>
      <button class="login-tab" onclick="showTab('register',this)">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="login-form-group">
        <label class="login-label">Email Address</label>
        <div class="login-input-wrap">
          <i class="fa-solid fa-envelope login-input-icon"></i>
          <input class="login-input" type="email" placeholder="admin@savoria.com" required/>
        </div>
      </div>
      <div class="login-form-group">
        <label class="login-label">Password</label>
        <div class="login-input-wrap">
          <i class="fa-solid fa-lock login-input-icon"></i>
          <input class="login-input" type="password" placeholder="Enter your password" required/>
        </div>
      </div>
      <div class="login-extras">
        <label class="login-remember"><input type="checkbox" checked/> Remember me</label>
        <a href="#" class="login-forgot">Forgot password?</a>
      </div>
      <button type="submit" class="login-btn">Sign In <i class="fa-solid fa-arrow-right" style="margin-left:6px;font-size:11px"></i></button>
    </form>

    <!-- Register Form (hidden) -->
    <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
      <div class="login-form-group">
        <label class="login-label">Full Name</label>
        <div class="login-input-wrap">
          <i class="fa-solid fa-user login-input-icon"></i>
          <input class="login-input" type="text" placeholder="Your full name" required/>
        </div>
      </div>
      <div class="login-form-group">
        <label class="login-label">Email Address</label>
        <div class="login-input-wrap">
          <i class="fa-solid fa-envelope login-input-icon"></i>
          <input class="login-input" type="email" placeholder="you@example.com" required/>
        </div>
      </div>
      <div class="login-form-group">
        <label class="login-label">Password</label>
        <div class="login-input-wrap">
          <i class="fa-solid fa-lock login-input-icon"></i>
          <input class="login-input" type="password" placeholder="Create a password" required/>
        </div>
      </div>
      <div class="login-form-group">
        <label class="login-label">Confirm Password</label>
        <div class="login-input-wrap">
          <i class="fa-solid fa-shield-halved login-input-icon"></i>
          <input class="login-input" type="password" placeholder="Confirm password" required/>
        </div>
      </div>
      <button type="submit" class="login-btn" style="margin-top:8px">Create Account <i class="fa-solid fa-arrow-right" style="margin-left:6px;font-size:11px"></i></button>
    </form>

    <!-- Social -->
    <div class="login-divider">or continue with</div>
    <div class="login-social">
      <button class="login-social-btn"><i class="fa-brands fa-google"></i> Google</button>
      <button class="login-social-btn"><i class="fa-brands fa-apple"></i> Apple</button>
      <button class="login-social-btn"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
    </div>

  </div>
</div>

<script>
  // Particles
  (function() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = Math.random() * 8 + 's';
      container.appendChild(p);
    }
  })();

  function showTab(tab, btn) {
    btn.parentElement.querySelectorAll('.login-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  }

  function handleLogin(e) {
    e.preventDefault();
    window.location.href = 'index.html';
  }

  function handleRegister(e) {
    e.preventDefault();
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
